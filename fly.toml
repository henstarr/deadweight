app = "deadweight"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8340
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "deadweight_data"
  destination = "/data"

[env]
  DEADWEIGHT_DB = "/data/deadweight.db"
