services:
  deadweight:
    build: .
    ports:
      - "8340:8340"
    environment:
      - DEADWEIGHT_DB=/data/deadweight.db
      - DEADWEIGHT_TOKEN=${DEADWEIGHT_TOKEN:-}
    volumes:
      - deadweight-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8340/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  deadweight-data:
