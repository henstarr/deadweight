services:
  - type: web
    name: deadweight
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: PYTHONPATH=src uvicorn deadweight.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: deadweight-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DEADWEIGHT_TOKEN
        sync: false

  - type: cron
    name: deadweight-keepalive
    runtime: python
    schedule: "*/10 * * * *"
    buildCommand: echo ok
    startCommand: python -c "import urllib.request; urllib.request.urlopen('https://deadweight.dev/health')"

databases:
  - name: deadweight-db
    plan: free
    databaseName: deadweight
